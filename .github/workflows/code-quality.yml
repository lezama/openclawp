name: Code Quality

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.distignore'
      - '.wordpress-org/**'
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: code-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-build:
    name: Lint + Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Build plugin assets
        run: npm run build

      - name: Verify build artifacts exist
        run: |
          set -e
          for path in blocks/chat/build/view.js blocks/routines/build/view.js; do
            if [ ! -s "$path" ]; then
              echo "::error file=$path::missing or empty build artifact"
              exit 1
            fi
            echo "ok: $path ($(wc -c < "$path") bytes)"
          done
